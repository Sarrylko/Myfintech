# MyFintech AI Stack — Linux variant (Ollama stays on Windows PC at 192.168.1.9)
#
# Ollama is NOT started here — it runs on the Windows PC (192.168.1.9:11434).
# All services that need Ollama point directly to that LAN IP.
#
# Start:   docker compose -f docker-compose.ai.linux.yml --profile ai up -d --build
# Stop:    docker compose -f docker-compose.ai.linux.yml --profile ai down
# Logs:    docker compose -f docker-compose.ai.linux.yml --profile ai logs -f

services:

  # ── Vector database ─────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: fintech-qdrant
    restart: "no"
    profiles: ["ai"]
    ports:
      - "6333:6333"
    volumes:
      - qdrant:/qdrant/storage
    networks:
      - ai-internal
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Ingest Worker ────────────────────────────────────────────────────────────
  ingest-worker:
    build:
      context: ./ai/ingest-worker
    container_name: fintech-ingest-worker
    restart: "no"
    profiles: ["ai"]
    environment:
      OLLAMA_URL: http://192.168.1.9:11434
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: ${RAG_DATABASE_URL:-postgresql://MyFintechReadonly:changeme@postgres:5432/myfintech}
      FINANCE_DOC_ROOT: /data/finance
      EMBED_MODEL: ${RAG_EMBED_MODEL:-nomic-embed-text}
      QDRANT_COLLECTION_DB: ${RAG_COLLECTION_DB:-fintech_rag_db}
      QDRANT_COLLECTION_DOCS: ${RAG_COLLECTION_DOCS:-fintech_rag_docs}
      DB_SYNC_INTERVAL_SECONDS: ${INGEST_DB_SYNC_INTERVAL:-3600}
      FILE_RECONCILE_INTERVAL_SECONDS: ${INGEST_FILE_RECONCILE_INTERVAL:-3600}
      FILE_WATCH_ENABLED: ${INGEST_FILE_WATCH:-true}
      INGEST_API_KEY: ${INGEST_API_KEY:-}
    volumes:
      - ${UPLOADS_HOST_PATH:-/home/sarvjeet/myfintech-data/uploads}:/data/finance:ro
    ports:
      - "8002:8000"
    networks:
      - ai-internal
      - myfintech_private
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── RAG API ─────────────────────────────────────────────────────────────────
  rag-api:
    build:
      context: ./ai/rag-api
    container_name: fintech-rag-api
    restart: "no"
    profiles: ["ai"]
    environment:
      OLLAMA_URL: http://192.168.1.9:11434
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: ${RAG_DATABASE_URL:-postgresql://MyFintechReadonly:changeme@postgres:5432/myfintech}
      FINANCE_DOC_ROOT: /data/finance
      LLM_MODEL: ${RAG_LLM_MODEL:-qwen2.5:7b-instruct}
      EMBED_MODEL: ${RAG_EMBED_MODEL:-nomic-embed-text}
      QDRANT_COLLECTION: ${RAG_COLLECTION:-fintech_rag}
      DB_SYNC_INTERVAL_SECONDS: ${RAG_DB_SYNC_INTERVAL:-3600}
      RAG_API_KEY: ${RAG_API_KEY:-}
      INGEST_WORKER_URL: http://ingest-worker:8000
    volumes:
      - ${UPLOADS_HOST_PATH:-/home/sarvjeet/myfintech-data/uploads}:/data/finance:ro
    ports:
      - "8001:8000"
    networks:
      - ai-internal
      - myfintech_private
    depends_on:
      qdrant:
        condition: service_healthy
      ingest-worker:
        condition: service_healthy

  # ── Chat UI ──────────────────────────────────────────────────────────────────
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: fintech-openwebui
    restart: "no"
    profiles: ["ai"]
    environment:
      OLLAMA_BASE_URL: http://192.168.1.9:11434
      OPENAI_API_BASE_URL: http://rag-api:8000/v1
      OPENAI_API_KEY: ${RAG_API_KEY:-fintech-local}
      WEBUI_NAME: "MyFintech AI"
      DEFAULT_MODELS: fintech-assistant
    volumes:
      - openwebui:/app/backend/data
    ports:
      - "3001:8080"
    networks:
      - ai-internal
    depends_on:
      - rag-api

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  ai-internal:
    driver: bridge
    name: fintech_ai_internal
  myfintech_private:
    external: true

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  qdrant:
    name: fintech_qdrant
  openwebui:
    name: fintech_openwebui
